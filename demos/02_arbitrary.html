<div class="flex min-h-screen items-center justify-center bg-zinc-100 p-8">
  <!--
    ✅ CO JSME SE NAUČILI: Libovolné hodnoty + opacity modifier
    ─────────────────────────────────────────────────────────────
    bg-[#7c3aed]                    vlastní hex barva (místo předdefinované)
    from-[#7c3aed] to-[#a78bfa]     vlastní barvy v gradientu
    h-[5px]                         přesná výška mimo škálu (h-1=4px, h-2=8px)
    w-[65%]                         přesné procento místo w-2/3 (~66.7 %)
    shadow-[0_8px_32px_...]         vlastní stín s barvou
    bg-violet-600/10                opacity modifier — 10 % průhlednosti barvy
  -->

  <!-- 🆕 shadow-[...] — vlastní barevný stín -->
  <div
    class="w-80 bg-white rounded-2xl shadow-[0_8px_32px_rgba(124,58,237,0.15)] border border-zinc-200 overflow-hidden"
  >
    <!-- 🆕 gradient z vlastních hex barev + h-[5px] místo h-2 -->
    <div class="h-[5px] bg-gradient-to-r from-[#7c3aed] to-[#a78bfa]"></div>

    <div class="p-6">
      <!-- 🆕 bg-violet-600/10 — opacity modifier, žádná nová barva -->
      <span
        class="inline-block px-2 py-1 text-xs font-semibold text-violet-700 bg-violet-600/10 rounded-full"
      >
        Probíhá
      </span>

      <h2 class="mt-3 text-xl font-bold text-zinc-900">Redesign webu</h2>

      <p class="mt-2 text-sm text-zinc-500 leading-relaxed">
        Kompletní přepracování firemního webu s důrazem na rychlost a
        přístupnost.
      </p>

      <div class="mt-4 flex flex-wrap gap-2">
        <span
          class="px-2 py-1 text-xs font-medium text-zinc-600 bg-zinc-100 rounded-md"
          >UI/UX</span
        >
        <span
          class="px-2 py-1 text-xs font-medium text-zinc-600 bg-zinc-100 rounded-md"
          >Tailwind</span
        >
        <span
          class="px-2 py-1 text-xs font-medium text-zinc-600 bg-zinc-100 rounded-md"
          >Vite</span
        >
      </div>

      <!-- 🆕 h-[5px] a w-[65%] — přesné hodnoty mimo škálu -->
      <div class="mt-5">
        <div class="flex justify-between text-xs text-zinc-500 mb-1">
          <span>Postup</span>
          <span>65 %</span>
        </div>
        <div class="w-full h-[5px] bg-zinc-100 rounded-full">
          <!-- 🆕 bg-[#7c3aed] — přesná hex barva místo bg-violet-500 -->
          <div class="h-[5px] w-[65%] bg-[#7c3aed] rounded-full"></div>
        </div>
      </div>

      <button
        class="mt-5 w-full py-2 bg-violet-600 text-white text-sm font-semibold rounded-xl"
      >
        Zobrazit projekt
      </button>
    </div>
  </div>
</div>
